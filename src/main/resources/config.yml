redis:
  host: "127.0.0.1"
  port: 6379
  password: ""
  database: 0
  key-prefix: "vstats"
  connection-timeout-millis: 1000
  socket-timeout-millis: 1000
  failure-log-cooldown-seconds: 60

node:
  id: "prx01"
  group: "public"

heartbeat:
  interval-seconds: 5
  ttl-seconds: 15

backend:
  enabled: true
  unassigned-name: "unassigned"

command:
  primary: "vstats"

permissions:
  view: "vstats.view"
  staff: "vstats.staff"
  list: "vstats.list"
  reload: "vstats.reload"
